<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="style.css">
</head>
<body>


    <div class="login-card">
        <h2>Welcome Back!</h2>
        <p>Apne account mein login karein</p>
        
        <form>
            <div class="input-box">
                <input type="email" placeholder="Email Address" id="semail" required>
            </div>
            
            <div class="input-box">
                <input type="password" placeholder="Password" id="spassword" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>


    <script src="index.js"  type="module"></script>
</body>
</html>
