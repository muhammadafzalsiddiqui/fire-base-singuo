<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote App - Login & Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-card">
    <h2>Welcome!</h2>
    <p id="toggle-text">Apne account mein SignUp karein</p>
    
    <div id="signup-form">
        <div class="input-box">
            <input type="email" placeholder="Email Address" id="semail">
        </div>
        <div class="input-box">
            <input type="password" placeholder="Password" id="spassword">
        </div>
        <button class="login-btn" id="signup-btn">Create Account</button>
        <p class="signup-link">Already have an account? <a href="#" onclick="toggleForm()">Login</a></p>
    </div>

    <div id="login-form" style="display: none;">
        <div class="input-box">
            <input type="email" placeholder="Email Address" id="lemail">
        </div>
        <div class="input-box">
            <input type="password" placeholder="Password" id="lpassword">
        </div>
        <button class="login-btn" id="login-btn">Login Now</button>
        <p class="signup-link">Don't have an account? <a href="#" onclick="toggleForm()">SignUp</a></p>
    </div>
</div>

    <script type="module" src="index.js"></script>
</body>
</html>
